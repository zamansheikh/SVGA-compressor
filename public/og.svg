    animations.
  </text>

  <text x="80" y="540" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="400" fill="white" opacity="0.7">
    Upload. Preview. Compress. Download. All in your browser.
