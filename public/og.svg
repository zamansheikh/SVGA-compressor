<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070914"/>
      <stop offset="100%" stop-color="#131c54"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#3066ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3066ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3066ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5890ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- grid -->
  <g opacity="0.08" stroke="white" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>

  <!-- logo mark -->
  <g transform="translate(80, 80)">
    <rect width="96" height="96" rx="22" fill="url(#logo)"/>
    <g transform="translate(48, 48)">
      <path d="M-18 6c0 6 4.5 9 12 9s12-3 12-9-4.5-7.5-12-9c-7.5-1.5-10.5-3-10.5-7.5 0-4.5 4.5-7.5 10.5-7.5s10.5 3 10.5 7.5"
            fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <circle cx="20" cy="-18" r="4.5" fill="white"/>
    </g>
  </g>

  <!-- label -->
  <text x="200" y="120" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="600" fill="white" opacity="0.85">
    SVGA Compressor
  </text>
  <text x="200" y="152" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18" font-weight="400" fill="white" opacity="0.55">
    client-side · no uploads · free
  </text>

  <!-- Headline -->
  <text x="80" y="340" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="104" font-weight="800" fill="white" letter-spacing="-4">
    Shrink
  </text>
  <text x="340" y="340" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="104" font-weight="800" fill="url(#textGrad)" letter-spacing="-4">
    .svga
  </text>
  <text x="80" y="460" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
